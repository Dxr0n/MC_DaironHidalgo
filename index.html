<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faisbuk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="contenedor-login">
    <img src="visual/decorative.png" alt="Círculo decorativo" class="circulo-decorativo">
    <div class="minicontenedor-login">
      <h2>Login<img src="visual/circule.png" alt="Icono de círculo" class="icono"></h2>
      <form class="contenido">
        <div class="grupo-entrada">
          <label for="username">Username</label>
          <div class="input-container">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <img src="visual/circule.png" alt="Icono de círculo" class="icono">
          </div>
        </div>
        <div class="grupo-entrada">
          <label for="password">Password</label>
          <div class="input-container">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <img src="visual/circule.png" alt="Icono de círculo" class="icono">
          </div>
        </div>
        <button type="submit">LOGIN</button>
      </form>
    </div>
    <div class="extras">
      <img src="visual/cloud.png" alt="Cloud Icon" class="cloud-image">
      <button class="recordar-login">Remember<br>Login</button>
    </div>
    <div class="imagenes-borde-inferior">
      <img src="visual/rectangule.png" alt="Imagen rectangular" class="imagen-rectangulo">
      <img src="visual/rectangule.png" alt="Imagen rectangular" class="imagen-rectangulo">
      <img src="visual/rectangule.png" alt="Imagen rectangular" class="imagen-rectangulo">
      <img src="visual/rectangule.png" alt="Imagen rectangular" class="imagen-rectangulo">
    </div>
  </main>
</body>
</html>
